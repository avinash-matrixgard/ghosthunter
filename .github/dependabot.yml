version: 2
updates:
  # Python dependencies via Poetry.
  #
  # versioning-strategy = "increase" preserves the existing caret/range style
  # in pyproject.toml -- only bumps the lower bound when the new version
  # actually conflicts with the current constraint. Without this, Dependabot
  # tries to widen "^8.0.0" into ">=8,<10" (multi-major span) which we don't
  # want -- major version bumps should be manual decisions, not auto-PRs.
  #
  # The ignore block below stops Dependabot from opening *major* version
  # bump PRs at all (major bumps need human evaluation -- breaking changes,
  # API surface, etc.). Minor + patch updates still flow through normally.
  - package-ecosystem: "pip"
    directory: "/"
    versioning-strategy: "increase"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions: same posture. Dependabot updates SHAs to current
  # latest of the pinned major version. Major-version bumps are ignored
  # so we don't get noisy v4-to-v6/v7 PRs that need human review.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
